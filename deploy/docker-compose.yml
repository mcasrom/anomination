services:
  anonimation:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

volumes:
  uploads: