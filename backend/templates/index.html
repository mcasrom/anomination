<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymation</title>
<meta name="theme-color" content="#0f0f13">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f13; color: #eaeaea; min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.3rem; }
  .sub { text-align: center; color: #9a9ab0; font-size: 0.9rem; margin-bottom: 2rem; }
  .card {
    background: #1a1a24; border-radius: 12px; padding: 1.5rem;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .dropzone {
    border: 2px dashed #9a9ab0; border-radius: 12px;
    padding: 3rem 2rem; text-align: center; cursor: pointer;
    transition: all 0.3s;
  }
  .dropzone:hover { border-color: #6c5ce7; background: rgba(108,92,231,0.08); }
  .dropzone input { display: none; }
  .dropzone .icon { font-size: 3rem; margin-bottom: 0.5rem; }
  .dropzone p { color: #9a9ab0; }
  .dropzone .formats { font-size: 0.8rem; margin-top: 0.4rem; color: #6c5ce7; }
  .loading { text-align: center; padding: 2rem; display: none; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #24243a;
    border-top-color: #6c5ce7; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; }
  .result-img {
    max-width: 100%; max-height: 500px; border-radius: 8px;
    margin: 1rem 0; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .info {
    display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    margin: 0.75rem 0;
  }
  .tag {
    padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
  }
  .tag-doc { background: rgba(108,92,231,0.2); color: #a29bfe; }
  .tag-redacted { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .tag-ok { background: rgba(46,213,115,0.2); color: #2ed573; }
  .btn {
    display: inline-block; padding: 0.8rem 2rem; border-radius: 50px;
    font-size: 1rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none;
  }
  .btn-download { background: #2ed573; color: #000; margin: 0.5rem; }
  .btn-new { background: #24243a; color: #eaeaea; margin: 0.5rem; }
  .error {
    background: rgba(231,76,60,0.15); border-left: 3px solid #e74c3c;
    padding: 1rem; border-radius: 8px; color: #ff6b6b; margin: 1rem 0; display: none;
  }
  .detected-fields { margin: 1rem 0; font-size: 0.85rem; color: #9a9ab0; }
  .detected-fields span { display: inline-block; padding: 0.15rem 0.5rem; margin: 0.15rem; border-radius: 4px; font-size: 0.8rem; }
  .field-redacted { background: rgba(231,76,60,0.2); color: #ff6b6b; }
  .field-kept { background: rgba(46,213,115,0.2); color: #2ed573; }
  footer { text-align: center; color: #9a9ab0; font-size: 0.8rem; padding: 2rem 0; margin-top: 2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>◈ Anonymation</h1>
  <p class="sub">Oculta automáticamente los datos personales de tus documentos</p>

  <div class="card">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*,.pdf" />
      <div class="icon">🪪</div>
      <p>Arrastra un documento o haz clic para seleccionar</p>
      <p class="formats">DNI · NIE · Pasaporte · Carnet · Sanitaria · Empadronamiento · PDF</p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p id="loadText">Analizando con IA...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="info" id="info"></div>
      <div style="text-align:center">
        <img id="resultImg" class="result-img" alt="" />
        <div class="detected-fields" id="fieldsList"></div>
        <div>
          <a id="downloadBtn" class="btn btn-download">⬇ Descargar</a>
          <button class="btn btn-new" id="newBtn">← Nuevo</button>
        </div>
      </div>
    </div>
  </div>

  <footer>Los archivos se eliminan tras el procesamiento.</footer>
</div>

<script>
const MAX_DIM = 1600;

const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');
const ld = document.getElementById('loading');
const lt = document.getElementById('loadText');
const er = document.getElementById('error');
const rs = document.getElementById('result');
const ri = document.getElementById('resultImg');
const ii = document.getElementById('info');
const fl = document.getElementById('fieldsList');
const db = document.getElementById('downloadBtn');
const nb = document.getElementById('newBtn');

dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = '#6c5ce7'; };
dz.ondragleave = () => dz.style.borderColor = '#9a9ab0';
dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = '#9a9ab0'; if (e.dataTransfer.files[0]) go(e.dataTransfer.files[0]); };
fi.onchange = () => { if (fi.files[0]) go(fi.files[0]); };
nb.onclick = () => { rs.style.display = 'none'; er.style.display = 'none'; dz.style.display = 'block'; fi.value = ''; };

function resize(f, max) {
  return new Promise((ok, no) => {
    const i = new Image();
    i.onload = () => {
      let {width: w, height: h} = i;
      if (w > max || h > max) { if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; } }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(i, 0, 0, w, h);
      c.toBlob(b => ok(new File([b], f.name, {type: f.type})), f.type, 0.92);
    };
    i.onerror = () => no('No se pudo cargar');
    const r = new FileReader();
    r.onload = e => i.src = e.target.result;
    r.readAsDataURL(f);
  });
}

function go(f) {
  dz.style.display = 'none';
  er.style.display = 'none';
  rs.style.display = 'none';
  ld.style.display = 'block';
  lt.textContent = 'Analizando con IA...';

  const step = f.type.startsWith('image/') ? resize(f, MAX_DIM).then(r => r) : Promise.resolve(f);
  step.then(file => {
    const fd = new FormData();
    fd.append('file', file);
    return fetch('/api/auto-redact', { method: 'POST', body: fd });
  }).then(r => r.json()).then(d => {
    ld.style.display = 'none';
    if (!d.success) { er.textContent = d.error || 'Error'; er.style.display = 'block'; return; }

    ii.innerHTML = `
      <span class="tag tag-doc">${d.document_name || 'Documento'}</span>
      <span class="tag tag-redacted">Redactados: ${(d.redacted_fields || []).length}</span>
    `;

    if (d.detected_fields) {
      fl.innerHTML = 'Campos detectados: ' + d.detected_fields.map(f =>
        `<span class="${f.sensitive ? 'field-redacted' : 'field-kept'}">${f.label || f.key}${f.sensitive ? ' ✕' : ' ✓'}</span>`
      ).join(' ');
    } else {
      fl.innerHTML = '';
    }

    ri.src = d.result_url;
    db.href = d.result_url;
    db.download = d.download_name || 'anonimizado.png';
    rs.style.display = 'block';
  }).catch(e => {
    ld.style.display = 'none';
    er.textContent = 'Error de conexión: ' + (e.message || e);
    er.style.display = 'block';
  });
}
</script>
</body>
</html>
